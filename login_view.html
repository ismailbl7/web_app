<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h1>Welcome Back</h1>
  <p>Please login to continue</p>

  <div class="input-box">
    <span>👤</span>
    <input type="text" placeholder="Username">
  </div>

  <div class="input-box">
    <span>🔒</span>
    <input type="password" placeholder="Password">
  </div>

  <button>Login</button>

  <div class="footer">Forgot password?</div>
</div>

</body>
</html>
